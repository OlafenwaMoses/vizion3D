site_name: vizion3d
site_url: https://olafenwamoses.github.io/vizion3D/
site_description: Unified 3D Computer Vision Library
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            show_root_heading: true
            show_source: true

nav:
  - Home: index.md
  - Hardware Acceleration: hardware_acceleration.md
  - Features:
      - Depth Estimation: features/depth_estimation.md
      - Depth Estimation Advanced Config: features/depth_estimation_advanced_config.md
      - Stereo Depth: features/stereo_depth.md
      - Depth Estimation vs Stereo Depth: features/depth_estimation_vs_stereo_depth.md
  - API Reference:
      - Lifting (2D → 3D): api/lifting.md
