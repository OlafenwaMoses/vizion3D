syntax = "proto3";

package vizion3d.lifting;

service LiftingService {
  rpc RunDepthEstimation (DepthEstimationRequest) returns (DepthEstimationResponse);
  rpc RunStereoDepth (StereoDepthRequest) returns (StereoDepthResponse);
  rpc RunObjectMaskAnnotation3D (ObjectMaskAnnotation3DRequest) returns (ObjectMaskAnnotation3DResponse);
}

// ── Depth Estimation ──────────────────────────────────────────────────────────

message DepthEstimationAdvanceConfig {
  optional float fx = 1;
  optional float fy = 2;
  optional float cx = 3;
  optional float cy = 4;
  optional float depth_scale = 5;
  optional float depth_trunc = 6;
}

message DepthEstimationRequest {
  bytes image_bytes = 1;
  string model_backend = 2;
  bool return_depth_image = 3;
  bool return_point_cloud = 4;
  optional string local_model_path = 6;
  optional DepthEstimationAdvanceConfig advanced_config = 7;
}

message FloatRow {
  repeated float values = 1;
}

message DepthEstimationResponse {
  repeated FloatRow depth_map = 1;
  float min_depth = 2;
  float max_depth = 3;
  string backend_used = 4;
  bytes depth_image = 5;
  bytes point_cloud_ply = 6;
}

// ── Stereo Depth ──────────────────────────────────────────────────────────────

message StereoDepthAdvancedConfig {
  optional float focal_length = 1;
  optional float cx = 2;
  optional float cy = 3;
  optional float baseline = 4;
  optional float doffs = 5;
  optional float z_far = 6;
  optional float conf_threshold = 7;
  optional float occ_threshold = 8;
  optional float scale_factor = 9;
}

message StereoDepthRequest {
  bytes left_image_bytes = 1;
  bytes right_image_bytes = 2;
  string model_backend = 3;
  bool return_depth_image = 4;
  bool return_point_cloud = 5;
  optional StereoDepthAdvancedConfig advanced_config = 7;
}

message StereoDepthResponse {
  repeated FloatRow depth_map = 1;
  repeated FloatRow disparity_map = 2;
  float min_depth = 3;
  float max_depth = 4;
  string backend_used = 5;
  bytes depth_image = 6;
  bytes point_cloud_ply = 7;
}

// ── ObjectMaskAnnotation3D ────────────────────────────────────────────────────

message ObjectMaskAnnotation3DConfig {
  optional float fx = 1;
  optional float fy = 2;
  optional float cx = 3;
  optional float cy = 4;
  optional float conf_threshold = 5;
  optional float iou_threshold = 6;
}

message ObjectMaskAnnotation3DRequest {
  bytes image_bytes = 1;          // optional: empty = synthesise from point cloud
  bytes point_cloud_ply = 2;
  string model_backend = 3;
  bool return_object_clouds = 4;
  bool return_annotated_cloud = 5;
  optional ObjectMaskAnnotation3DConfig advanced_config = 6;
}

// Per-object mask annotation entry in the response.
message MaskAnnotation3DItem {
  string label = 1;
  int32 class_id = 2;
  float confidence = 3;
  repeated float bbox_2d = 4;         // [x1, y1, x2, y2] in pixels
  bytes mask_image = 5;               // PNG-encoded uint8 grayscale mask (255=object)
  repeated int32 point_indices = 6;   // indices into the input point cloud
  repeated FloatRow point_coords = 7; // Nx3 [x, y, z] coordinates in metres
  bytes object_cloud_ply = 8;         // optional extracted PLY for this object
}

message ObjectMaskAnnotation3DResponse {
  repeated MaskAnnotation3DItem annotations = 1;
  bytes annotated_cloud_ply = 2;  // optional full cloud with object colours
  string backend_used = 3;
}
