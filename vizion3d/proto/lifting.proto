syntax = "proto3";

package vizion3d.lifting;

service LiftingService {
  rpc RunDepthEstimation (DepthEstimationRequest) returns (DepthEstimationResponse);
  rpc RunStereoDepth (StereoDepthRequest) returns (StereoDepthResponse);
  rpc RunObjectMaskAnnotation3D (ObjectMaskAnnotation3DRequest) returns (ObjectMaskAnnotation3DResponse);
  rpc RunSceneMaskAnnotation3D (SceneMaskAnnotation3DRequest) returns (SceneMaskAnnotation3DResponse);
  rpc RunScaleObservation (ScaleObservationRequest) returns (ScaleObservationResponse);
  rpc RunObject3DReconstruction (Object3DReconstructionRequest) returns (Object3DReconstructionResponse);
  rpc RunSceneComponents3DReconstruction (SceneComponents3DReconstructionRequest) returns (SceneComponents3DReconstructionResponse);
}

// ── Depth Estimation ──────────────────────────────────────────────────────────

message DepthEstimationAdvanceConfig {
  optional float fx = 1;
  optional float fy = 2;
  optional float cx = 3;
  optional float cy = 4;
  optional float depth_scale = 5;
  optional float depth_trunc = 6;
}

message DepthEstimationRequest {
  bytes image_bytes = 1;
  string model_backend = 2;
  bool return_depth_image = 3;
  bool return_point_cloud = 4;
  optional string local_model_path = 6;
  optional DepthEstimationAdvanceConfig advanced_config = 7;
}

message FloatRow {
  repeated float values = 1;
}

message DepthEstimationResponse {
  repeated FloatRow depth_map = 1;
  float min_depth = 2;
  float max_depth = 3;
  string backend_used = 4;
  bytes depth_image = 5;
  bytes point_cloud_ply = 6;
}

// ── Stereo Depth ──────────────────────────────────────────────────────────────

message StereoDepthAdvancedConfig {
  optional float focal_length = 1;
  optional float cx = 2;
  optional float cy = 3;
  optional float baseline = 4;
  optional float doffs = 5;
  optional float z_far = 6;
  optional float conf_threshold = 7;
  optional float occ_threshold = 8;
  optional float scale_factor = 9;
}

message StereoDepthRequest {
  bytes left_image_bytes = 1;
  bytes right_image_bytes = 2;
  string model_backend = 3;
  bool return_depth_image = 4;
  bool return_point_cloud = 5;
  optional StereoDepthAdvancedConfig advanced_config = 7;
}

message StereoDepthResponse {
  repeated FloatRow depth_map = 1;
  repeated FloatRow disparity_map = 2;
  float min_depth = 3;
  float max_depth = 4;
  string backend_used = 5;
  bytes depth_image = 6;
  bytes point_cloud_ply = 7;
}

// ── ObjectMaskAnnotation3D ────────────────────────────────────────────────────

message ObjectMaskAnnotation3DConfig {
  optional float fx = 1;
  optional float fy = 2;
  optional float cx = 3;
  optional float cy = 4;
  optional float conf_threshold = 5;
  optional float iou_threshold = 6;
}

message ObjectMaskAnnotation3DRequest {
  bytes image_bytes = 1;          // optional: empty = synthesise from point cloud
  bytes point_cloud_ply = 2;
  string model_backend = 3;
  bool return_object_clouds = 4;
  bool return_annotated_cloud = 5;
  optional ObjectMaskAnnotation3DConfig advanced_config = 6;
}

// Per-object mask annotation entry in the response.
message MaskAnnotation3DItem {
  string label = 1;
  int32 class_id = 2;
  float confidence = 3;
  repeated float bbox_2d = 4;         // [x1, y1, x2, y2] in pixels
  bytes mask_image = 5;               // PNG-encoded uint8 grayscale mask (255=object)
  repeated int32 point_indices = 6;   // indices into the input point cloud
  repeated FloatRow point_coords = 7; // Nx3 [x, y, z] coordinates in metres
  bytes object_cloud_ply = 8;         // optional extracted PLY for this object
}

message ObjectMaskAnnotation3DResponse {
  repeated MaskAnnotation3DItem annotations = 1;
  bytes annotated_cloud_ply = 2;  // optional full cloud with object colours
  string backend_used = 3;
}

// ── SceneMaskAnnotation3D (semantic) ──────────────────────────────────────────

message SceneMaskAnnotation3DConfig {
  optional float fx = 1;
  optional float fy = 2;
  optional float cx = 3;
  optional float cy = 4;
  optional int32 inference_size = 5;
}

message SceneMaskAnnotation3DRequest {
  bytes image_bytes = 1;          // optional: empty = synthesise from point cloud
  bytes point_cloud_ply = 2;
  string model_backend = 3;
  bool return_region_clouds = 4;
  bool return_annotated_cloud = 5;
  optional SceneMaskAnnotation3DConfig advanced_config = 6;
}

// Per-class semantic mask annotation entry in the response.
message SemanticMaskAnnotation3DItem {
  string label = 1;
  int32 class_id = 2;                 // ADE20K class index (0..149)
  repeated float bbox_2d = 3;         // [x1, y1, x2, y2] of the class region
  bytes mask_image = 4;               // PNG-encoded uint8 grayscale mask (255=class)
  int32 pixel_count = 5;
  repeated int32 point_indices = 6;   // indices into the input point cloud
  repeated FloatRow point_coords = 7; // Nx3 [x, y, z] coordinates in metres
  bytes region_cloud_ply = 8;         // optional extracted PLY for this class
}

message SceneMaskAnnotation3DResponse {
  repeated SemanticMaskAnnotation3DItem annotations = 1;
  bytes annotated_cloud_ply = 2;  // optional full cloud with class palette colours
  string backend_used = 3;
}

// ── ScaleObservation ─────────────────────────────────────────────────────────

message ScaleObservationAnnotation {
  string label = 1;
  int32 class_id = 2;
  float confidence = 3;
  repeated float bbox_2d = 4;
  repeated FloatRow point_coords = 5;
  bytes mask_image = 6;               // PNG-encoded uint8 grayscale mask (255=object)
}

message ScaleObservationRequest {
  bytes point_cloud_ply = 1;
  repeated ScaleObservationAnnotation annotations = 2;
  bool return_scaled_point_cloud = 3;
  bool return_scaled_depth = 4;
  bool return_report = 5;
  optional int32 image_width = 6;
  optional int32 image_height = 7;
  optional float fx = 8;
  optional float fy = 9;
  optional float cx = 10;
  optional float cy = 11;
}

message ScaleCandidateItem {
  string label = 1;
  string dimension = 2;
  float observed_relative = 3;
  float prior_m = 4;
  float scale = 5;
  float weight = 6;
  bool accepted = 7;
  string rejection_reason = 8;
}

message ScaleObservationResponse {
  float scale_factor = 1;
  float scale_confidence = 2;
  string scale_confidence_reason = 3;
  string algorithm_version = 4;
  int32 accepted_candidates = 5;
  int32 rejected_candidates = 6;
  repeated ScaleCandidateItem candidates = 7;
  bytes scaled_point_cloud_ply = 8;
  bytes scaled_depth_png = 9;
}

// ── 3D Reconstruction ────────────────────────────────────────────────────────

message Object3DReconstructionConfig {
  reserved 4;
  reserved 5;

  optional int32 marching_cubes_resolution = 1;
  optional float density_threshold = 2;
  optional int32 point_count = 3;
  optional string device = 6;
  optional float foreground_ratio = 7;
  optional int32 smoothing_iterations = 8;
  optional float min_component_area_ratio = 9;
  optional int32 max_input_dimension = 10;
}

message Object3DReconstructionRequest {
  bytes image_bytes = 1;
  string model_bundle = 2;
  optional Object3DReconstructionConfig advanced_config = 3;
}

message Object3DReconstructionResponse {
  bytes mesh_ply = 1;
  bytes point_cloud_ply = 2;
  int32 vertex_count = 3;
  int32 face_count = 4;
  int32 point_count = 5;
  string backend_used = 6;
}

message SceneComponents3DReconstructionConfig {
  optional int32 max_input_dimension = 1;
  optional int32 max_objects = 2;
  optional float confidence_threshold = 3;
  optional float padding_ratio = 4;
  optional Object3DReconstructionConfig object_config = 5;
}

message SceneComponents3DReconstructionRequest {
  bytes image_bytes = 1;
  string model_bundle = 2;
  string depth_model_backend = 3;
  string annotation_model_backend = 4;
  optional SceneComponents3DReconstructionConfig advanced_config = 5;
}

message SceneComponent3DItem {
  string label = 1;
  int32 class_id = 2;
  float confidence = 3;
  repeated float bbox_2d = 4;
  bytes mesh_ply = 5;
  bytes point_cloud_ply = 6;
  int32 vertex_count = 7;
  int32 face_count = 8;
  int32 point_count = 9;
}

message SceneComponents3DReconstructionResponse {
  repeated SceneComponent3DItem components = 1;
  repeated int32 source_image_size = 2;
  repeated int32 analysis_image_size = 3;
  string depth_backend_used = 4;
  string annotation_backend_used = 5;
  string reconstruction_backend_used = 6;
}
